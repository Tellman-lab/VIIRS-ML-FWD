name: viirs-ml-fwd
channels:
  - conda-forge
dependencies:
  - python=3.11
  - libgdal=3.8.*
  - hdf4
  - pip
  - affine=2.4.*
  - beautifulsoup4=4.12.*
  - fastai=2.7.*
  - geopandas=1.0.*
  - ipython=8.31.*
  - numpy=2.2.*
  - pandas=2.2.*
  - pyproj=3.6.*
  - rasterio=1.3.*
